services:
  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speech-to-text-web
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WHISPER_SERVICE_URL=http://whisper:5000
    depends_on:
      whisper:
        condition: service_healthy
    networks:
      - speech-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node.js WebSocket Proxy
  asr-proxy:
    build:
      context: .
      dockerfile: Dockerfile.asr-proxy
    container_name: speech-to-text-asr
    restart: unless-stopped
    ports:
      - "3013:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - WHISPER_SERVICE_URL=http://whisper:5000
    depends_on:
      whisper:
        condition: service_healthy
    networks:
      - speech-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python Whisper ASR Service
  whisper:
    build:
      context: ./mini-services/whisper-service
      dockerfile: Dockerfile
    container_name: speech-to-text-whisper
    restart: unless-stopped
    ports:
      - "5010:5000"
    environment:
      - WHISPER_MODEL=small
      - WHISPER_DEVICE=cpu
      - PORT=5000
    volumes:
      - whisper-models:/root/.cache/whisper
    networks:
      - speech-network
    deploy:
      resources:
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  speech-network:
    driver: bridge

volumes:
  whisper-models:
